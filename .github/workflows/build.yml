name: Build APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        id: build_debug
        run: |
          set -o pipefail
          gradle assembleDebug --no-daemon --stacktrace --info > build.log 2>&1 || (
            echo "=== BUILD FAILED ==="
            tail -300 build.log
            exit 1
          )

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Debug APK
        if: steps.build_debug.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: acordes-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: acordes-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
        continue-on-error: true
